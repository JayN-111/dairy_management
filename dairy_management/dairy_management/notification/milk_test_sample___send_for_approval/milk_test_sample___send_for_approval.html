<p>Dear Dairy Manager,</p>
<p>A milk test sample requires your approval.</p>
<table border="1" cellpadding="8"
style="border-collapse:collapse; font-size:13px; width:100%">
    <tr style="background:#f5f5f5">
        <td><b>Sample ID</b></td>
        <td>{{ doc.name }}</td>
    </tr>
    <tr>
        <td><b>Member</b></td>
        <td>{{ doc.member }}</td>
    </tr>
    <tr style="background:#f5f5f5">
        <td><b>Collection Date</b></td>
        <td>{{ doc.collection_date }}</td>
    </tr>
    <tr>
        <td><b>Milk Type</b></td>
        <td>{{ doc.milk_type }}</td>
    </tr>
    <tr style="background:#f5f5f5">
        <td><b>Fat %</b></td>
        <td>{{ doc.fat }}</td>
    </tr>
    <tr>
        <td><b>Grade</b></td>
        <td>{{ doc.grade }}</td>
    </tr>
</table>
<br>
<a href="/app/milk-test-sample/{{ doc.name }}"
style="padding:8px 16px; background:#4CAF50;
color:white; text-decoration:none; border-radius:4px;">
    Review & Approve
</a>
