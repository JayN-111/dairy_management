<div class="dairy-summary-board" style="padding: 20px;">

	<h2 style="margin-bottom:20px;">🥛 Dairy Summary Board</h2>

	<!-- Date Filter -->
	<div style="margin-bottom:20px; display:flex; gap:15px; align-items:center;">
		<div>
			<label>From Date</label>
			<input type="date" id="from_date" class="form-control"
			style="width:180px;">
		</div>
		<div>
			<label>To Date</label>
			<input type="date" id="to_date" class="form-control"
			style="width:180px;">
		</div>
		<div style="margin-top:22px;">
			<button class="btn btn-primary btn-sm" onclick="load_summary()">
				Apply Filter
			</button>
			<button class="btn btn-default btn-sm" onclick="clear_filter()">
				Clear
			</button>
		</div>
	</div>

	<!-- Summary Cards -->
	<div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">

		<!-- Buy Summary -->
		<div style="background:#fff; border:1px solid #d1d8dd;
		border-radius:8px; padding:20px;">
			<h4 style="color:#2196F3; margin-bottom:15px;">
				Buy Summary
			</h4>
			<div style="display:flex; gap:15px;">
				<div style="flex:1; background:#e3f2fd; border-radius:8px;
				padding:15px; text-align:center;">
					<div style="font-size:13px; color:#666;">Total Litres</div>
					<div id="buy_ltr" style="font-size:28px; font-weight:bold;
					color:#1565C0;">—</div>
					<div style="font-size:12px; color:#999;">Ltr</div>
				</div>
				<div style="flex:1; background:#e3f2fd; border-radius:8px;
				padding:15px; text-align:center;">
					<div style="font-size:13px; color:#666;">Total Price</div>
					<div id="buy_price" style="font-size:28px; font-weight:bold;
					color:#1565C0;">—</div>
					<div style="font-size:12px; color:#999;">₹</div>
				</div>
			</div>
		</div>

		<!-- Sale Summary -->
		<div style="background:#fff; border:1px solid #d1d8dd;
		border-radius:8px; padding:20px;">
			<h4 style="color:#4CAF50; margin-bottom:15px;">
				Sale Summary
			</h4>
			<div style="display:flex; gap:15px;">
				<div style="flex:1; background:#e8f5e9; border-radius:8px;
				padding:15px; text-align:center;">
					<div style="font-size:13px; color:#666;">Total Litres</div>
					<div id="sale_ltr" style="font-size:28px; font-weight:bold;
					color:#2e7d32;">—</div>
					<div style="font-size:12px; color:#999;">Ltr</div>
				</div>
				<div style="flex:1; background:#e8f5e9; border-radius:8px;
				padding:15px; text-align:center;">
					<div style="font-size:13px; color:#666;">Total Price</div>
					<div id="sale_price" style="font-size:28px; font-weight:bold;
					color:#2e7d32;">—</div>
					<div style="font-size:12px; color:#999;">₹</div>
				</div>
			</div>
		</div>

	</div>

	<!-- Pending Stock -->
	<div id="pending_stock_card" style="background:#fff; border:1px solid #d1d8dd;
	border-radius:8px; padding:25px; text-align:center; margin-bottom:20px;">
		<h4 style="margin-bottom:10px;">⏳ Pending Stock</h4>
		<div id="pending_ltr" style="font-size:42px; font-weight:bold;">—</div>
		<div style="color:#999; margin-bottom:15px;">Litres remaining in warehouse</div>
		<div style="font-size:13px; color:#666; margin-bottom:15px;">
			Total Buy − Total Sale = Pending Stock
		</div>
		<button id="stock_entry_btn" class="btn btn-warning"
		onclick="create_stock_entry()">
			📦 Create Stock Entry
		</button>
	</div>

</div>
