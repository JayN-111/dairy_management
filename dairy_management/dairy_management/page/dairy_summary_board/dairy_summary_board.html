<div class="dairy-summary-board" style="padding: 20px;">

	<h2 style="margin-bottom:20px;">🥛 Dairy Summary Board</h2>

	<!-- Date Filter -->
	<div style="margin-bottom:20px; display:flex; gap:15px; align-items:center;">
		<div>
			<label>From Date</label>
			<input type="date" id="from_date" class="form-control" style="width:180px;">
		</div>
		<div>
			<label>To Date</label>
			<input type="date" id="to_date" class="form-control" style="width:180px;">
		</div>
		<div style="margin-top:22px;">
			<button class="btn btn-primary btn-sm" onclick="load_summary()">Apply Filter</button>
			<button class="btn btn-default btn-sm" onclick="clear_filter()">Clear</button>
		</div>
	</div>

	<!-- Summary -->
	<div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">

		<!-- Buy -->
		<div style="background:#fff; border:1px solid #d1d8dd; border-radius:8px; padding:20px;">
			<h4 style="color:#2196F3;">Buy Summary</h4>
			<div style="display:flex; gap:15px;">
				<div style="flex:1; text-align:center;">
					<div>Total Litres</div>
					<div id="buy_ltr">—</div>
				</div>
				<div style="flex:1; text-align:center;">
					<div>Total Price</div>
					<div id="buy_price">—</div>
				</div>
			</div>
		</div>

		<!-- Sale -->
		<div style="background:#fff; border:1px solid #d1d8dd; border-radius:8px; padding:20px;">
			<h4 style="color:#4CAF50;">Sale Summary</h4>
			<div style="display:flex; gap:15px;">
				<div style="flex:1; text-align:center;">
					<div>Total Litres</div>
					<div id="sale_ltr">—</div>
				</div>
				<div style="flex:1; text-align:center;">
					<div>Total Price</div>
					<div id="sale_price">—</div>
				</div>
			</div>
		</div>

	</div>

	<!-- Pending -->
	<div id="pending_stock_card" style="background:#fff; border:1px solid #d1d8dd; border-radius:8px; padding:25px; text-align:center;">
		<h4>⏳ Pending Stock</h4>
		<div id="pending_ltr" style="font-size:28px;">—</div>
		<div>Buy − Sale</div>

		<button id="stock_entry_btn" class="btn btn-warning" onclick="create_stock_entry()">
			📦 Create Stock Entry
		</button>
	</div>

</div>
